services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: brume
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brume"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - brume-postgres:/var/lib/postgresql/data

volumes:
  brume-postgres:

